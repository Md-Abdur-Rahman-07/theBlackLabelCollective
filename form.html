<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Luxury Service Booking Form</title>

    <!-- Google Fonts: Poppins -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">

    <!-- Font Awesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Flatpickr CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">

    <!-- Flatpickr JS -->
    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background-color: #121212;
            color: #E0E0E0;
        }

        :root {
            --gold: #D4AF37;
            --dark-gold: #B8860B;
            --input-bg: #1E1E1E;
            --form-bg: #181818;
        }

        .form-container {
            background-color: var(--form-bg);
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(212, 175, 55, 0.1), 0 0 80px rgba(0, 0, 0, 0.5) inset;
            border: 2px solid transparent;
            background-clip: padding-box;
            border-image: linear-gradient(145deg, var(--dark-gold), var(--gold), #2a2a2a) 1;
        }

        .form-title {
            color: var(--gold);
            text-shadow: 0 0 10px rgba(212, 175, 55, 0.5);
        }

        .title-separator {
            height: 2px;
            width: 80px;
            background-image: linear-gradient(to right, var(--dark-gold), var(--gold));
            margin: 0 auto 2rem;
        }

        .switch-wrapper {
            background-color: var(--input-bg);
            border: 1px solid #333;
            border-radius: 50rem;
            padding: 0.25rem;
        }

        .switch-wrapper input[type="radio"] {
            display: none;
        }

        .switch-wrapper .switch-label {
            transition: color 0.3s ease;
            z-index: 10;
        }

        .switch-wrapper .switch-bg {
            background-image: linear-gradient(to right, var(--dark-gold), var(--gold));
            box-shadow: 0 0 15px rgba(212, 175, 55, 0.4);
            transition: transform 0.3s cubic-bezier(0.68, -0.55, 0.27, 1.55);
            border-radius: 50rem;
            width: 50%;
            height: calc(100% - 0.5rem);
            top: 0.25rem;
            left: 0.25rem;
        }

        .switch-wrapper input[type="radio"]:checked+.switch-label {
            color: #121212;
            font-weight: 600;
        }

        #hour:checked~.switch-bg {
            transform: translateX(0%);
        }

        #round:checked~.switch-bg {
            transform: translateX(calc(100% - 0.5rem));
        }

        /* RE-ENGINEERED INPUT FIELD STYLES */
        .input-group {
            position: relative;
        }

        /* The fake border created with a pseudo-element */
        .input-group::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            border: 1px solid #333;
            border-radius: 0.375rem;
            /* Bootstrap's default radius */
            pointer-events: none;
            /* Allows clicks to pass through to the input */
            transition: border-color 0.3s, box-shadow 0.3s;
            z-index: 1;
            /* Layer behind everything else */
        }

        /* The actual input field - now borderless */
        .form-control {
            background-color: var(--input-bg);
            border: none;
            /* The border is now handled by the pseudo-element */
            color: #E0E0E0;
            padding-left: 3rem;
            position: relative;
            z-index: 2;
            /* Ensure input is above the fake border */
        }

        .form-control:focus {
            outline: none;
            box-shadow: none;
            /* Shadow is now on the pseudo-element */
            background-color: transparent;
            color: #E0E0E0;
        }

        /* Style the fake border on focus */
        .input-group:focus-within::before {
            border-color: var(--gold);
            box-shadow: 0 0 10px rgba(212, 175, 55, 0.3);
        }

        .input-icon {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            left: 1rem;
            color: #555;
            transition: color 0.3s;
            z-index: 3;
            /* Icon must be above the input field */
        }

        .input-group:focus-within .input-icon {
            color: var(--gold);
        }

        .floating-label {
            position: absolute;
            top: 50%;
            left: 3rem;
            transform: translateY(-50%);
            color: #777;
            pointer-events: none;
            transition: all 0.2s ease-out;
            background-color: var(--input-bg);
            padding: 0 0.25rem;
            z-index: 2;
            /* Above the border but below icon/floated label */
        }

        .form-control:focus~.floating-label,
        .form-control:not(:placeholder-shown)~.floating-label {
            top: 0;
            left: 0.75rem;
            font-size: 0.75rem;
            color: var(--gold);
            background-color: var(--form-bg);
            /* This creates the "cut-out" effect */
            z-index: 3;
            /* Label must be on top of everything when floated */
        }

        textarea.form-control {
            padding-left: 1rem;
        }

        textarea.form-control~.floating-label {
            left: 1rem;
        }

        .submit-btn {
            background-image: linear-gradient(to right, var(--dark-gold), var(--gold));
            color: #121212;
            font-weight: 600;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(212, 175, 55, 0.2);
            border: none;
        }

        .submit-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(212, 175, 55, 0.4);
            color: #121212;
        }
    </style>
</head>

<body class="min-vh-100 d-flex align-items-center justify-content-center p-4">

    <div class="form-container w-100 p-4 p-md-5" style="max-width: 900px;">
        <h1 class="form-title display-5 fw-bold text-center mb-2">Request a Quote</h1>
        <div class="title-separator"></div>

        <form method="post" action="mail/mail.php">

            <div class="position-relative switch-wrapper d-flex align-items-center my-4">
                <input type="radio" name="type" id="hour" value="Hourly" checked>
                <label for="hour"
                    class="switch-label flex-grow-1 text-center cursor-pointer p-2 rounded-pill">Hourly</label>

                <input type="radio" name="type" id="round" value="Round Trip">
                <label for="round" class="switch-label flex-grow-1 text-center cursor-pointer p-2 rounded-pill">Round
                    Trip</label>

                <div class="switch-bg position-absolute"></div>
            </div>

            <div class="row g-4 pt-4">

                <div class="col-md-6">
                    <div class="input-group">
                        <input type="text" id="name" name="name" placeholder=" " required class="form-control py-3">
                        <i class="fas fa-user input-icon"></i>
                        <label for="name" class="floating-label">Full Name</label>
                    </div>
                </div>

                <div class="col-md-6">
                    <div class="input-group">
                        <input type="tel" id="phone" name="phone" placeholder=" " required class="form-control py-3">
                        <i class="fas fa-phone input-icon"></i>
                        <label for="phone" class="floating-label">Phone Number</label>
                    </div>
                </div>

                <div class="col-12">
                    <div class="input-group">
                        <input type="email" id="email" name="email" placeholder=" " required class="form-control py-3">
                        <i class="fas fa-envelope input-icon"></i>
                        <label for="email" class="floating-label">Email Address</label>
                    </div>
                </div>

                <div class="col-md-6">
                    <div class="input-group">
                        <input type="text" id="datetime" name="datetime" placeholder=" "
                            onfocus="(this.type='datetime-local')" onblur="(this.type='text')" required
                            class="form-control py-3">
                        <i class="fas fa-calendar-alt input-icon"></i>
                        <label for="datetime" class="floating-label">Date & Time</label>
                    </div>
                </div>

                <div class="col-md-6">
                    <div class="input-group">
                        <input type="number" id="passanger" name="passanger" placeholder=" " required min="1"
                            class="form-control py-3">
                        <i class="fas fa-users input-icon"></i>
                        <label for="passanger" class="floating-label">Number Of Riders</label>
                    </div>
                </div>

                <div class="col-md-6">
                    <div class="input-group">
                        <input type="text" id="pickup" name="pickup" placeholder=" " required class="form-control py-3">
                        <i class="fas fa-map-marker-alt input-icon"></i>
                        <label for="pickup" class="floating-label">Pickup Location</label>
                    </div>
                </div>

                <div class="col-md-6">
                    <div class="input-group">
                        <input type="text" id="dropoff" name="dropoff" placeholder=" " required
                            class="form-control py-3">
                        <i class="fas fa-map-pin input-icon"></i>
                        <label for="dropoff" class="floating-label">Drop Off Location</label>
                    </div>
                </div>

                <div class="col-md-6">
                    <div class="input-group">
                        <input type="number" id="long" name="long" placeholder=" " min="0" class="form-control py-3">
                        <i class="fas fa-hourglass-half input-icon"></i>
                        <label for="long" class="floating-label">Length (in hours)</label>
                    </div>
                </div>

                <div class="col-md-6">
                    <div class="input-group">
                        <input type="text" id="addTrip" name="addTrip" placeholder=" " class="form-control py-3">
                        <i class="fas fa-route input-icon"></i>
                        <label for="addTrip" class="floating-label">Additional stops?</label>
                    </div>
                </div>

                <div class="col-12">
                    <div class="input-group">
                        <textarea id="add" name="add" placeholder=" " rows="4" class="form-control py-3"></textarea>
                        <label for="add" class="floating-label">Additional Details</label>
                    </div>
                </div>
            </div>

            <div class="col-12 mt-4">
                <button type="submit" class="btn submit-btn w-100 p-3 fs-5">
                    Request a Quote
                </button>
            </div>
        </form>
    </div>

    <script>
        flatpickr("#datetime", {
            enableTime: true,
            dateFormat: "Y-m-d H:i",
            minDate: "today",
            minuteIncrement: 1,
            time_24hr: true,
            onReady: function (selectedDates, dateStr, instance) {
                setMinMaxTime(instance);
            },
            onChange: function (selectedDates, dateStr, instance) {
                setMinMaxTime(instance);
            },
        });

        function setMinMaxTime(instance) {
            const currentDate = instance.selectedDates[0] || new Date();
            const today = new Date();
            const isToday = currentDate.toDateString() === today.toDateString();

            const minTime = isToday ? Math.max(today.getHours() + 1, 9) + ":00" : "09:00";
            const maxTime = "18:00";

            instance.set("minTime", minTime);
            instance.set("maxTime", maxTime);

            if (isToday && currentDate.getHours() >= 18) {
                instance.clear(); // Clear date if outside allowed time range
            }
        }
    </script>
</body>

</html>
